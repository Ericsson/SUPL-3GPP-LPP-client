stages:
  - build

variables:
  DOCKER_BUILDKIT: "1"
  REGISTRY: registry.rosetta.ericssondevops.com/ewasjon/supl-3gpp-lpp-client

build:
  stage: build
  image: docker:latest
  tags:
    - lsp-runner
  parallel:
    matrix:
      - PLATFORM:
          - aarch64-rpi4-linux-gnu
          - arm-cortex_a8-linux-gnueabi
  before_script:
    - apk add --no-cache python3 git
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx use default
  script:
    - BRANCH=$(git rev-parse --abbrev-ref HEAD)
    - docker pull "$REGISTRY/builder:$PLATFORM"
    - docker tag "$REGISTRY/builder:$PLATFORM" "s3lc-builder:$PLATFORM"
    - python3 docker/build-images.py
        --platform "$PLATFORM"
        --build-mode debug
        --registry "$REGISTRY"
        --tag "$BRANCH"
        --no-provenance
        --no-pull-builders
        --force
    - TAG="${BRANCH}-debug"
    - docker push "$REGISTRY/tools/$PLATFORM:$TAG"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH =~ /^2026-summer-/
      when: manual
